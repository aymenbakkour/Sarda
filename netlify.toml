[build]
  command = "npm run build"
  # Netlify's Next.js runtime automatically handles the publish directory
  # but we can explicitly set it to .next if needed. It's best to leave it default.

# Ensure proper caching headers for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
